name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Fetch pinned OpenVR native dependency
        shell: pwsh
        run: ./fetch-openvr.ps1

      - name: Restore .NET dependencies
        run: dotnet restore VRChatVoiceInput.sln

      - name: Build solution
        run: dotnet build VRChatVoiceInput.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test VRChatVoiceInput.sln --configuration Release --no-build
