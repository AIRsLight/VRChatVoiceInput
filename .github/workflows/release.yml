name: Portable release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/VRChatVoiceInput.App/WebUI/package-lock.json

      - name: Fetch pinned OpenVR native dependency
        shell: pwsh
        run: ./fetch-openvr.ps1

      - name: Build source-only portable package
        shell: pwsh
        run: >-
          ./build-portable.ps1
          -ModelSet none
          -RuntimeSet none
          -ConfigurationPath appsettings.example.json
          -OutputDirectory artifacts/release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VRChatVoiceInput-win-x64
          path: artifacts/release/VRChatVoiceInput-win-x64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          artifacts/release/VRChatVoiceInput-win-x64.zip
          --verify-tag
          --generate-notes
